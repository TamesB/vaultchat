{% extends "_base.html" %}

{% block title %}Payment canceled · VaultChat{% endblock %}

{% block content %}
  <div class="mx-auto max-w-xl">
    <div class="rounded-2xl border border-zinc-800 bg-zinc-950/60 p-6">
      <h1 class="text-xl font-semibold">Payment canceled</h1>
      <p class="mt-2 text-sm text-zinc-400">No worries — you can try again anytime.</p>
      <div class="mt-5 flex flex-col gap-3 sm:flex-row">
        <a class="inline-flex items-center justify-center rounded-md bg-accent-500 px-4 py-2 text-sm font-medium text-white hover:bg-accent-400" href="{% url 'billing:pay' %}">
          Try payment again
        </a>
        <a class="inline-flex items-center justify-center rounded-md border border-zinc-800 bg-zinc-900 px-4 py-2 text-sm font-medium text-zinc-200 hover:bg-zinc-800" href="{% url 'web:dashboard' %}">
          Back to dashboard
        </a>
      </div>
    </div>
  </div>
{% endblock %}
