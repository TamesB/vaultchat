<header class="sticky top-0 z-40 border-b border-zinc-800/60 bg-zinc-950/70 backdrop-blur">
  <div class="mx-auto flex h-14 max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-6">
      <a href="{% url 'web:home' %}" class="flex items-center gap-2 font-semibold tracking-tight">
        <span class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-accent-500/15 ring-1 ring-accent-500/30">
          <span class="h-3 w-3 rounded-sm bg-accent-400"></span>
        </span>
        <span>VaultChat</span>
      </a>

      {% if request.user.is_authenticated %}
        <nav class="hidden items-center gap-4 text-sm text-zinc-300 sm:flex">
          <a class="hover:text-white" href="{% url 'web:dashboard' %}">Dashboard</a>
          <a class="hover:text-white" href="{% url 'documents:index' %}">Documents</a>
          <a class="hover:text-white" href="{% url 'chat:home' %}">Chat</a>
        </nav>
      {% endif %}
    </div>

    <div class="flex items-center gap-3">
      {% if request.user.is_authenticated %}
        <div class="hidden text-xs text-zinc-400 sm:block">
          {{ request.user.email }}
          {% if current_org %}
            <span class="mx-2 text-zinc-700">/</span>
            <span class="text-zinc-300">{{ current_org.name }}</span>
          {% endif %}
        </div>
        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button
            type="submit"
            class="inline-flex items-center rounded-md border border-zinc-800 bg-zinc-900 px-3 py-1.5 text-sm text-zinc-200 hover:bg-zinc-800"
          >
            Logout
          </button>
        </form>
      {% else %}
        <a
          href="{% url 'accounts:login' %}"
          class="inline-flex items-center rounded-md bg-accent-500 px-3 py-1.5 text-sm font-medium text-white hover:bg-accent-400"
        >
          Sign in
        </a>
      {% endif %}
    </div>
  </div>
</header>
